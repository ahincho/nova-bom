name: Delete BOM versions

on: workflow_dispatch

jobs:
  delete-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: delete
    steps:
      - name: Delete stale BOM 1.0.0 versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listing versions before deletion:"
          for pkg in nova-bom nova-spring-boot-bom nova-quarkus-bom nova-micronaut-bom; do
            echo "=== $pkg ==="
            gh api "/users/ahincho/packages/maven/pe.edu.nova.java.$pkg/versions" --jq '.[] | "\(.id) \(.name)"' 2>&1 || echo "(empty or 404)"
          done

          echo ""
          echo "Deleting 1.0.0 versions..."
          for pkg in nova-bom nova-spring-boot-bom nova-quarkus-bom nova-micronaut-bom; do
            echo "--- deleting $pkg:1.0.0 ---"
            IDS=$(gh api "/users/ahincho/packages/maven/pe.edu.nova.java.$pkg/versions" --jq '.[] | select(.name == "1.0.0") | .id' 2>/dev/null)
            for id in $IDS; do
              echo "  deleting id=$id"
              gh api --method DELETE "/users/ahincho/packages/maven/pe.edu.nova.java.$pkg/versions/$id" \
                -H "Accept: application/vnd.github+json" 2>&1
            done
          done

          echo ""
          echo "Verification (should NOT show 1.0.0 anymore):"
          for pkg in nova-bom nova-spring-boot-bom nova-quarkus-bom nova-micronaut-bom; do
            echo "=== $pkg ==="
            gh api "/users/ahincho/packages/maven/pe.edu.nova.java.$pkg/versions" --jq '.[] | .name' 2>&1
          done