name: Debug BOM

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Download and inspect
        run: |
          echo "=========================================="
          echo "nova-mapper-utils maven-metadata.xml"
          echo "=========================================="
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://maven.pkg.github.com/ahincho/nova-java-mapper-utils/pe/edu/nova/java/libs/nova-mapper-utils/maven-metadata.xml"
          echo ""
          echo "=========================================="
          echo "nova-java-mapper-utils listed versions (API)"
          echo "=========================================="
          gh api /users/ahincho/packages/maven/pe.edu.nova.java.libs.nova-mapper-utils/versions --jq '.[] | .name' 2>/dev/null || echo "API unavailable"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}