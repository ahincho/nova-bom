name: Debug BOM

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Print BOM contents
        run: |
          echo "=== nova-bom:1.0.0 ==="
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://maven.pkg.github.com/ahincho/nova-bom/pe/edu/nova/java/nova-bom/1.0.0/nova-bom-1.0.0.pom"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}